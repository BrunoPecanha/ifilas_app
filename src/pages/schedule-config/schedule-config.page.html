<app-custom-header
  title="CONFIGURAR AGENDA"
  subtitle="Defina horários de atendimento"
  [showStartButton]="true"
  startIconName="arrow-back"
  [showEndButton]="true"
  (onEndClick)="save()"
  endIconName="checkmark"
></app-custom-header>

<ion-content class="ion-padding">
  <ion-segment [(ngModel)]="activeTab" value="week">
    <ion-segment-button value="week">
      <ion-label>Horários Fixos</ion-label>
    </ion-segment-button>
    <ion-segment-button value="exceptions">
      <ion-label>Exceções</ion-label>
    </ion-segment-button>
  </ion-segment>

  <!-- Semana -->
  <section *ngIf="activeTab === 'week'" class="tab-section">
    <ion-card *ngFor="let day of weekDays" class="day-card">
      <ion-item lines="none">
        <ion-label><strong>{{ day.label }}</strong></ion-label>
        <ion-toggle slot="end" [(ngModel)]="day.enabled" color="primary"></ion-toggle>
      </ion-item>

      <div *ngIf="day.enabled" class="time-inputs">
        <ion-datetime presentation="time" [(ngModel)]="day.startTime" placeholder="Início"></ion-datetime>
        <span class="divider">—</span>
        <ion-datetime presentation="time" [(ngModel)]="day.endTime" placeholder="Fim"></ion-datetime>
      </div>

      <div *ngIf="!day.enabled" class="day-off">Dia não trabalhado</div>
    </ion-card>
  </section>

  <!-- Exceções -->
  <section *ngIf="activeTab === 'exceptions'" class="tab-section">
    <ion-card class="exception-card">
      <ion-card-header>
        <ion-card-title>Adicionar Exceção</ion-card-title>
      </ion-card-header>
      <ion-card-content class="exception-form">
        <ion-datetime presentation="date" [(ngModel)]="exceptionDate" placeholder="Data"></ion-datetime>

        <ion-item lines="none">
          <ion-label>Dia inteiro fechado</ion-label>
          <ion-toggle slot="end" [(ngModel)]="fullDayClosed" color="danger"></ion-toggle>
        </ion-item>

        <div *ngIf="!fullDayClosed" class="time-inputs">
          <ion-datetime presentation="time" [(ngModel)]="exceptionStart" placeholder="Início"></ion-datetime>
          <span class="divider">—</span>
          <ion-datetime presentation="time" [(ngModel)]="exceptionEnd" placeholder="Fim"></ion-datetime>
        </div>

        <ion-button expand="block" size="small" (click)="addException()" color="success">
          Adicionar
        </ion-button>
      </ion-card-content>
    </ion-card>

    <ion-list *ngIf="exceptions.length" class="exception-list">
      <ion-item-sliding *ngFor="let ex of exceptions; let i = index">
        <ion-item [ngClass]="{'full-day-closed': ex.fullDayClosed}">
          <ion-label>
            <strong>{{ formatDate(ex.date) }}</strong><br />
            <span *ngIf="ex.fullDayClosed">
              <ion-icon name="lock-closed-outline"></ion-icon> Dia fechado
            </span>
            <span *ngIf="!ex.fullDayClosed">{{ ex.start }} - {{ ex.end }}</span>
          </ion-label>
        </ion-item>
        <ion-item-options side="end">
          <ion-item-option color="danger" (click)="removeException(i)">
            <ion-icon name="trash-outline"></ion-icon>
          </ion-item-option>
        </ion-item-options>
      </ion-item-sliding>
    </ion-list>

    <p *ngIf="exceptions.length === 0" class="no-exceptions">
      Nenhuma exceção cadastrada.
    </p>
  </section>
</ion-content>

<app-footer-menu></app-footer-menu>
