<ion-content class="forgot-password-page" scroll="false">
  <div class="page-wrapper">
    <div class="form-container animated-slide-up">
      <div class="go-back">
        <a routerLink="/login">
          <img
            src="assets/images/create-account/icon-go-back.svg"
            alt="Voltar"
          />
        </a>
      </div>

      <div class="form-header">
        <h1 class="title">Esqueceu a senha?</h1>
        <p class="subtitle">Insira o e-mail utilizado no momento da criação.</p>
      </div>

      <form
        #emailForm="ngForm"
        (ngSubmit)="onSubmit()"
        novalidate
        class="forgot-form"
      >
        <div class="input-group">
          <ion-item lines="none" class="input-field">
            <ion-icon name="mail-outline" slot="start"></ion-icon>
            <ion-input
              type="email"
              name="email"
              [(ngModel)]="email"
              placeholder="E-mail*"
              required
              email
              #emailInput="ngModel"
            ></ion-input>
          </ion-item>

          <div
            *ngIf="emailInput.invalid && emailInput.touched"
            class="error-message"
          >
            <small *ngIf="emailInput.errors?.['required']">
              E-mail é obrigatório.
            </small>
            <small *ngIf="emailInput.errors?.['email']">
              Informe um e-mail válido.
            </small>
          </div>
        </div>

        <ion-button
          expand="block"
          class="primary-btn"
          type="submit"
          [disabled]="emailForm.invalid"
        >
          Recuperar
        </ion-button>

        <div class="footer-credits">
          <p class="login-link">
            Já tem conta?
            <a routerLink="/login">Faça login</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</ion-content>
