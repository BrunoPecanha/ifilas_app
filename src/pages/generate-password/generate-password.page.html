<ion-content class="ion-padding forgot-password-page" scroll="false">
  <div class="curved-header">
    <div class="logo-wrapper">
      <img src="assets/images/login/logo.png" class="logo" />
    </div>
  </div>

  <div class="form-container">
    <div class="go-back">
      <a routerLink="/login">
        <img src="assets/images/create-account/icon-go-back.svg" alt="Icon go back" />
      </a>
    </div>

    <h1 class="title">Esqueceu a senha?</h1>
    <p class="subtitle">Insira o e-mail utilizado no momento da criação.</p>

    <form #emailForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
      <ion-item lines="none" class="input-field">
        <ion-icon name="mail-outline" slot="start"></ion-icon>
        <ion-input
          type="email"
          name="email"
          [(ngModel)]="email"
          placeholder="E-mail*"
          required
          email
          #emailInput="ngModel"
        ></ion-input>
      </ion-item>

      <div *ngIf="emailInput.invalid && emailInput.touched" class="error-message">
        <small *ngIf="emailInput.errors?.['required']">E-mail é obrigatório.</small>
        <small *ngIf="emailInput.errors?.['email']">Informe um e-mail válido.</small>
      </div>

      <ion-button expand="block" class="primary-btn" type="submit" [disabled]="emailForm.invalid">
        Recuperar
      </ion-button>

      <div class="login-link">
        <p>Já tem conta? <a routerLink="/login"> Faça login</a></p>
      </div>
    </form>
  </div>
</ion-content>
