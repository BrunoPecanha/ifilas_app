<app-custom-header
  title="AGENDAR HORÁRIO"
  subtitle="Selecione uma data e horário"
  [showStartButton]="true"
  startIconName="arrow-back"
  routerLink="/stores"
  [showEndButton]="false"
>
</app-custom-header>

<ion-content class="ion-padding">
  <section class="store-header" *ngIf="selectedStore">
    <div class="store-card">
      <ion-avatar class="store-avatar">
        <img
          [src]="selectedStore.image || 'https://yidudaduvasngangrydi.supabase.co/storage/v1/object/public/uploads/logo/5721731e-0301-45df-9799-aed397233717.jpeg'"
          [alt]="selectedStore.name"
        />
      </ion-avatar>

      <div class="store-info">
        <h2 class="store-title"><span>{{ selectedStore.name }}</span></h2>
        <p class="store-address">{{ selectedStore.address }}</p>
      </div>
    </div>
  </section>

  <section class="days-section">
    <h3>Selecione a data</h3>
    <div class="days-grid">
      <ion-button
        *ngFor="let day of availableDates"
        [disabled]="!day.available"
        [fill]="day.date.toDateString() === selectedDate?.toDateString() ? 'solid' : 'outline'"
        color="primary"
        (click)="selectDate(day)"
      >
        <div class="day-label">
          <span class="weekday">{{ day.date | date:'EEE' }}</span>
          <span class="daynum">{{ day.date | date:'dd/MM' }}</span>
        </div>
      </ion-button>
    </div>
  </section>

  <section *ngIf="selectedDate" class="times-section">
    <h3>{{ formatDate(selectedDate) }}</h3>

    <div class="times-grid">
      <ion-chip
        *ngFor="let slot of selectedTimeSlots"
        [color]="slot.available ? 'primary' : 'medium'"
        (click)="slot.available && selectTimeSlot(slot)"
      >
        {{ slot.time }}
      </ion-chip>
    </div>

    <p *ngIf="!selectedTimeSlots?.length" class="no-slots">
      Nenhum horário disponível neste dia.
    </p>
  </section>
</ion-content>

<app-footer-menu></app-footer-menu>
