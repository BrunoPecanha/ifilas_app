<app-custom-header
  title="AGENDAR HORÁRIO"
  subtitle="Selecioone uma data e horário"
  [showStartButton]="true"
  startIconName="arrow-back"
  routerLink="/stores"

  [showEndButton]="false"
></app-custom-header>

<ion-content class="ion-padding">
  <section class="store-header" *ngIf="selectedStore">
    <ion-avatar class="store-avatar">
      <img [src]="selectedStore.image" [alt]="selectedStore.name" />
    </ion-avatar>
    <div class="store-info">
      <h2>{{ selectedStore.name }}</h2>
      <p>{{ selectedStore.address }}</p>
    </div>
  </section>

  <section class="calendar-section">
    <div class="calendar-wrapper">
      <ion-datetime
        presentation="date"
        [min]="minDate"
        [max]="maxDate"
        [isDateEnabled]="isDateAvailable.bind(this)"
        (ionChange)="onDateSelected($event)"
        class="custom-calendar"
      >
        <div slot="title">Datas Disponíveis</div>
      </ion-datetime>
    </div>
  </section>

  <section *ngIf="selectedDate" class="times-section">
    <h3>Horários em {{ formatDate(selectedDate) }}</h3>

    <div class="times-grid">
      <ion-chip
        *ngFor="let slot of selectedTimeSlots"
        [color]="slot.available ? 'primary' : 'medium'"
        (click)="slot.available && selectTimeSlot(slot)"
      >
        {{ slot.time }}
      </ion-chip>
    </div>

    <p *ngIf="!selectedTimeSlots?.length" class="no-slots">
      Nenhum horário disponível neste dia.
    </p>
  </section>
</ion-content>

<app-footer-menu></app-footer-menu>
