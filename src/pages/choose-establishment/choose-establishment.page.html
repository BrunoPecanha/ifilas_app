<app-custom-header
  [subtitle]="'SELECIONE A LOJA'"
  [showStartButton]="true"
  [showEndButton]="false"
  [startIconName]="'arrow-back-outline'"
  [endIconName]="'refresh-outline'"
  (onStartClick)="getBack()">
</app-custom-header>

<ion-content class="establishment-content page-with-custom-header" (ionScroll)="onContentScroll($event)" [scrollEvents]="true">
  <div class="content-wrapper after-custom-header">  

    <div class="companies-section">
      <div class="companies-grid">
        <ion-card
          class="company-card"
          *ngFor="let est of filteredEstablishments"
          (click)="handleCompanyClick(est)"
          [class.loading]="loadingCompanyId === est.id">
          
          <div class="category-indicator" [style.background]="getCategoryColor(est.category)"></div>
          
          <ion-card-content>
            <div class="company-header">
              <div class="company-logo">
                <ng-container *ngIf="est.logoPath; else defaultCompanyLogo">
                  <ion-img
                    [src]="est.logoPath"
                    class="company-logo-img"
                    (ionError)="handleImageError($event)">
                  </ion-img>
                </ng-container>
                <ng-template #defaultCompanyLogo>
                  <div class="default-company-logo" [style.background]="getCategoryColor(est.category)">
                    <ion-icon name="storefront"></ion-icon>
                  </div>
                </ng-template>
              </div>

              <div class="company-info">
                <h3 class="company-name">{{ est.name }}</h3>
                <div class="company-meta">
                  <span class="company-category">{{ est.category }}</span>
                  <span class="company-status" [class.open]="est.isOpen" [class.closed]="!est.isOpen">
                    {{ est.isOpen ? 'Aberta' : 'Fechada' }}
                  </span>
                </div>
                
                <div class="company-location" *ngIf="est.city">
                  <ion-icon name="location-outline"></ion-icon>
                  <span>{{ est.city }}, {{ est.state }}</span>
                </div>
              </div>
            </div>

            <div class="loading-overlay" *ngIf="loadingCompanyId === est.id">
              <ion-spinner name="crescent" class="card-spinner"></ion-spinner>
              <span>Conectando...</span>
            </div>
          </ion-card-content>
        </ion-card>
      </div>

      <div class="empty-state" *ngIf="filteredEstablishments.length === 0">
        <ion-icon name="business-outline"></ion-icon>
        <h3>Nenhuma loja encontrada</h3>
        <p>Tente fechar e abrir o app</p>
      </div>
    </div>
  </div>

  <div class="scroll-indicator" [class.hidden]="!showScrollIndicator">
    <ion-icon name="chevron-down-outline"></ion-icon>
  </div>
</ion-content>
