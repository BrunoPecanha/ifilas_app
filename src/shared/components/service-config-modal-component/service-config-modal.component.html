<app-custom-header
  title="VALORES VARIÁVEIS"
  subtitle="Informe o valores finais"
  startIconName="close-outline"
  [showStartButton]="true"
  [endDisabled]="!form.valid"
  (onStartClick)="closeModal()"
  [showEndButton]="true"
  endIconName="checkmark"
  (onEndClick)="save()"
></app-custom-header>

<ion-content class="ion-padding" fullscreen>
  <form [formGroup]="form" class="form-container">
    <div formArrayName="services">
      <ion-card
        *ngFor="let group of servicesArray.controls; let i = index"
        [formGroupName]="i"
        class="service-card"
      >
        <ion-card-header class="card-header">
          <ion-card-title class="card-title">
            <ion-icon
              name="construct-outline"
              slot="start"
              color="primary"
              class="service-icon"
            ></ion-icon>
            {{ group.get("name")?.value }}
          </ion-card-title>
          <ion-badge color="primary" class="quantity-badge">
            {{ group.get("quantity")?.value }}x
          </ion-badge>
        </ion-card-header>

        <ion-card-content class="card-content">
          <!-- Preço -->
          <div class="input-group">
            <div class="input-header">
              <ion-icon name="cash-outline" class="input-header-icon"></ion-icon>
              <span class="input-title">Preço</span>
              <ion-text color="medium" class="input-unit">R$</ion-text>
            </div>
            <ion-item fill="outline" class="form-item">
              <ion-input
                formControlName="price"
                type="number"
                inputmode="decimal"
                placeholder="0,00"
                min="0"
                step="0.01"
                class="custom-input"
                (ionChange)="formatCurrency(i)"
              ></ion-input>
              <ion-icon
                *ngIf="group.get('price')?.touched && group.get('price')?.errors"
                name="alert-circle"
                color="danger"
                slot="end"
              ></ion-icon>
            </ion-item>
            <ion-text
              *ngIf="group.get('price')?.touched && group.get('price')?.errors?.['required']"
              color="danger"
              class="error-text"
            >
              Preço é obrigatório
            </ion-text>
            <ion-text
              *ngIf="group.get('price')?.touched && group.get('price')?.errors?.['min']"
              color="danger"
              class="error-text"
            >
              Valor mínimo: R$ 0,01
            </ion-text>
          </div>

          <!-- Duração com componente de tempo -->
          <div class="input-group">
            <div class="input-header">
              <ion-icon name="timer-outline" class="input-header-icon"></ion-icon>
              <span class="input-title">Duração</span>
            </div>
            
            <div class="time-picker-container">
              <div class="time-input-wrapper">
                <ion-item fill="outline" class="form-item hour-item">
                  <ion-input
                    [value]="getHours(i)"
                    type="number"
                    inputmode="numeric"
                    placeholder="0"
                    min="0"
                    max="9"
                    class="custom-input time-input"
                    (ionInput)="onHoursChange($event, i)"
                    [disabled]="group.get('duration')?.disabled"
                  ></ion-input>
                  <span class="time-label">h</span>
                </ion-item>

                <span class="time-separator">:</span>

                <ion-item fill="outline" class="form-item minute-item">
                  <ion-input
                    [value]="getMinutes(i)"
                    type="number"
                    inputmode="numeric"
                    placeholder="00"
                    min="0"
                    max="59"
                    class="custom-input time-input"
                    (ionInput)="onMinutesChange($event, i)"
                    [disabled]="group.get('duration')?.disabled"
                  ></ion-input>
                  <span class="time-label">min</span>
                </ion-item>
              </div>
            </div>

            <ion-text
              *ngIf="group.get('duration')?.touched && group.get('duration')?.errors?.['required']"
              color="danger"
              class="error-text"
            >
              Duração é obrigatória
            </ion-text>
            <ion-text
              *ngIf="group.get('duration')?.touched && group.get('duration')?.errors?.['min']"
              color="danger"
              class="error-text"
            >
              Duração mínima: 1 minuto
            </ion-text>
            <ion-text
              *ngIf="group.get('duration')?.touched && group.get('duration')?.errors?.['max']"
              color="danger"
              class="error-text"
            >
              Duração máxima: 10 horas
            </ion-text>
          </div>
        </ion-card-content>
      </ion-card>
    </div>
  </form>
</ion-content>

<app-footer-menu></app-footer-menu>
